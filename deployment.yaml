apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-node-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: devops-node-app
  template:
    metadata:
      labels:
        app: devops-node-app
    spec:
      containers:
        - name: devops-node-app
          image: devops-node-app:v1
          imagePullPolicy: Never
          ports:
            - containerPort: 3000